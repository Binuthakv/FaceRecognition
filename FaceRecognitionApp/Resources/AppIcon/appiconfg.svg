<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">

	<!-- Background -->
	<rect x="120" y="120" width="784" height="784" rx="180" fill="#0B2A6F"/>

	<!-- Outer Scanner Ring -->
	<circle cx="512" cy="512" r="250"
			stroke="#1E90FF"
			stroke-width="18"
			stroke-dasharray="28 20"
			opacity="0.9"/>

	<!-- Scanner Corners -->
	<g stroke="white" stroke-width="28" stroke-linecap="round">
		<path d="M300 250H230V320"/>
		<path d="M724 250H794V320"/>
		<path d="M300 774H230V704"/>
		<path d="M724 774H794V704"/>
	</g>

	<!-- Face Outline -->
	<path
	  d="M512 320
       C430 320 380 385 380 455
       V530
       C380 620 445 710 512 760
       C579 710 644 620 644 530
       V455
       C644 385 594 320 512 320Z"
	  stroke="white"
	  stroke-width="16"
	  fill="none"
	  stroke-linejoin="round"
  />

	<!-- Face Mesh -->
	<g stroke="white" stroke-width="5" opacity="0.9">
		<line x1="512" y1="390" x2="440" y2="470"/>
		<line x1="512" y1="390" x2="584" y2="470"/>
		<line x1="440" y1="470" x2="512" y2="520"/>
		<line x1="584" y1="470" x2="512" y2="520"/>
		<line x1="440" y1="470" x2="460" y2="640"/>
		<line x1="584" y1="470" x2="564" y2="640"/>
		<line x1="512" y1="520" x2="460" y2="640"/>
		<line x1="512" y1="520" x2="564" y2="640"/>
		<line x1="460" y1="640" x2="512" y2="710"/>
		<line x1="564" y1="640" x2="512" y2="710"/>
	</g>

	<!-- Mesh Nodes -->
	<g fill="white">
		<circle cx="512" cy="390" r="12"/>
		<circle cx="440" cy="470" r="11"/>
		<circle cx="584" cy="470" r="11"/>
		<circle cx="512" cy="520" r="12"/>
		<circle cx="460" cy="640" r="10"/>
		<circle cx="564" cy="640" r="10"/>
		<circle cx="512" cy="710" r="12"/>
	</g>

	<!-- Scan Line -->
	<rect x="280" y="500"
		  width="464"
		  height="12"
		  rx="6"
		  fill="#1E90FF"/>

</svg>